name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: |
          dotnet restore ./RuntimeFlow.Tests/RuntimeFlow.Tests.csproj --nologo
          dotnet restore ./RuntimeFlow.Generators.Tests/RuntimeFlow.Generators.Tests.csproj --nologo

      - name: Build
        run: |
          dotnet build ./RuntimeFlow.Tests/RuntimeFlow.Tests.csproj --configuration Release --no-restore --nologo
          dotnet build ./RuntimeFlow.Generators.Tests/RuntimeFlow.Generators.Tests.csproj --configuration Release --no-restore --nologo

      - name: Test (with coverage)
        run: |
          dotnet test ./RuntimeFlow.Tests/RuntimeFlow.Tests.csproj \
            --configuration Release \
            --no-build \
            --nologo \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Test generator
        run: |
          dotnet test ./RuntimeFlow.Generators.Tests/RuntimeFlow.Generators.Tests.csproj \
            --configuration Release \
            --no-build \
            --nologo \
            --logger "trx;LogFileName=generator-test-results.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn
