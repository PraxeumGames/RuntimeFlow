name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generator-build-and-test:
    name: Generator Build & Test (.NET 9)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: |
          dotnet restore ./RuntimeFlow.Generators.Tests/RuntimeFlow.Generators.Tests.csproj --nologo

      - name: Build
        run: |
          dotnet build ./RuntimeFlow.Generators.Tests/RuntimeFlow.Generators.Tests.csproj --configuration Release --no-restore --nologo

      - name: Validate packaged analyzer
        run: |
          dotnet build ./RuntimeFlow.Generators/RuntimeFlow.Generators.csproj --configuration Release --no-restore --nologo
          cmp -s \
            ./RuntimeFlow.Generators/bin/Release/netstandard2.0/RuntimeFlow.Generators.dll \
            ./com.praxeum.runtimeflow/Analyzers/RuntimeFlow.Generators.dll \
            || { echo "::error::Packaged RuntimeFlow.Generators.dll is stale. Rebuild and copy the Release analyzer into com.praxeum.runtimeflow/Analyzers/."; exit 1; }
          if grep -a "GameBuilder.Generators" ./com.praxeum.runtimeflow/Analyzers/RuntimeFlow.Generators.dll; then
            echo "::error::Packaged RuntimeFlow.Generators.dll still references GameBuilder.Generators."
            exit 1
          fi

      - name: Test generator
        run: |
          dotnet test ./RuntimeFlow.Generators.Tests/RuntimeFlow.Generators.Tests.csproj \
            --configuration Release \
            --no-build \
            --nologo \
            --logger "trx;LogFileName=generator-test-results.trx" \
            --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/**/*.trx
          if-no-files-found: warn

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./TestResults/**/coverage.cobertura.xml
          if-no-files-found: warn

  unity-editmode-runtime-tests:
    name: Unity EditMode Runtime Tests
    runs-on: ubuntu-latest
    if: ${{ vars.RUNTIMEFLOW_RUN_UNITY_TESTS == '1' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Unity EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: RuntimeFlow.UnityTests
          testMode: editmode
          artifactsPath: TestResults/UnityEditMode

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-test-results
          path: TestResults/UnityEditMode
          if-no-files-found: warn
